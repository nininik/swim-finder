.header-logo {

  background: var(--bg);

  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus {
  border-color: var(--blue);

.btn-search {

}
.btn-search:hover { background: #0D47CC; }
.btn-search:active { transform: scale(0.97); }

}
.quick-btn:hover { background: var(--aqua-light); border-color: var(--aqua); color: #0369A1; }

/* 데이터 정제 */
const POOLS = RAW_DATA.map((d, i) => ({
  id: i,
  name: d.n.replace(/\n/g, " ").trim(),
  sido: d.sd,
  sigungu: d.sg,
  addr: d.ad,
  fullAddr: d.fa,
  indoor: d.io,
  lanes: d.ln.replace(/\n.*/,'').trim(),
  length: d.le.replace(/\n.*/,'').replace("m","").trim(),
  width: d.wi.replace(/\n.*/,'').trim(),
  tel: d.te,
  homepage: d.hp,
  year: d.yr,
})).filter(p => p.name);

/* ── 상태 ── */
let allMatched = [];
let activeFilter = "all";
let selectedId = null;
let map = null;
let markers = [];
let markerMap = {};   // id → {marker, lat, lng}
let infoWindow = null;

/* ── 지도 초기화 ── */
function initMap() {
  if (!USE_MAP) {
    document.getElementById("map").style.display = "none";
    document.getElementById("layout").classList.add("no-map");
    return;
  }
  try {
    map = new naver.maps.Map("map", {
      center: new naver.maps.LatLng(36.5, 127.5),
      zoom: 7,
    });
    infoWindow = new naver.maps.InfoWindow({ anchorSkew: true });
  } catch(e) {
    document.getElementById("map").style.display = "none";
    document.getElementById("layout").classList.add("no-map");
  }
}

/* ── 검색 ── */
function quickSearch(q) {
  document.getElementById("searchInput").value = q;
  doSearch();
}

function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;

  showState("loading");

  setTimeout(() => {
    const ql = q.toLowerCase();
    allMatched = POOLS.filter(p =>
      p.name.includes(q) ||
      p.sido.includes(q) ||
      p.sigungu.includes(q) ||
      p.addr.includes(q) ||
      (p.sido + " " + p.sigungu).includes(q)
    );
    selectedId = null;
    renderCards();
    renderMarkers();
  }, 150);
}

/* ── 필터 ── */
function getFiltered() {
  return allMatched.filter(p => {
    if (activeFilter === "indoor") return p.indoor === "실내";
    if (activeFilter === "outdoor") return p.indoor !== "실내";
    if (activeFilter === "lanes") return p.lanes && p.lanes !== "" && p.lanes !== "-" && p.lanes !== "0";
    if (activeFilter === "50m") return p.length === "50";
    return true;
  });
}

/* ── 카드 렌더링 ── */
function renderCards() {
  const filtered = getFiltered();
  const info = document.getElementById("resultsInfo");
  const list = document.getElementById("cardList");
  const state = document.getElementById("stateBox");

  if (!allMatched.length) {
    list.innerHTML = "";
    info.style.display = "none";
    state.innerHTML = '<div class="state-icon">😔</div><div class="state-title">검색 결과 없음</div><div class="state-sub">다른 지역명이나 시설명을 입력해보세요<br><small style="color:#B8C5D9">예: 강남구, 잠실, 수원시</small></div>';
    state.style.display = "flex";
    return;
  }

  state.style.display = "none";
  info.style.display = "block";
  info.innerHTML = `총 <strong>${filtered.length}개</strong>의 시설이 검색되었습니다`;

  list.innerHTML = filtered.map(p => {
    const region = p.sido + (p.sigungu ? " " + p.sigungu : "");
    const addr = p.addr ? p.addr : "";
    const laneText = p.lanes && p.lanes !== "0" && p.lanes !== "-" ? p.lanes + "레인" : "";
    const sizeText = (p.length && p.width) ? p.length + "m × " + p.width + "m" : (p.length ? p.length + "m" : "");
    const is50 = p.length === "50";

    return `<div class="card${selectedId === p.id ? " sel" : ""}" data-id="${p.id}" onclick="selectCard(${p.id})">
      <div class="card-top">
        <div class="card-name">${p.name}</div>
        <div class="card-region">${region}</div>
      </div>
      ${addr ? `<div class="card-addr">${addr}</div>` : ""}
      <div class="tags">
        <span class="tag ${p.indoor === "실내" ? "t-indoor" : "t-outdoor"}">${p.indoor}</span>
        ${laneText ? `<span class="tag t-lanes">${laneText}</span>` : ""}
        ${sizeText ? `<span class="tag t-size">${sizeText}${is50 ? " ⭐" : ""}</span>` : ""}
      </div>
      <div class="detail${selectedId === p.id ? " open" : ""}" id="d${p.id}">
        <div class="detail-grid">
          <div class="di"><div class="di-label">레인</div><div class="di-val">${laneText || "정보 없음"}</div></div>
          <div class="di"><div class="di-label">규모</div><div class="di-val">${sizeText || "정보 없음"}</div></div>
          <div class="di"><div class="di-label">준공연도</div><div class="di-val">${p.year || "정보 없음"}</div></div>
          <div class="di"><div class="di-label">실내외</div><div class="di-val">${p.indoor}</div></div>
        </div>
        <div class="action-row">
          <button class="action-btn btn-map" onclick="event.stopPropagation(); showOnMap(${p.id})">🗺️ 지도 보기</button>
          ${p.tel ? `<a class="action-btn btn-tel" href="tel:${p.tel.replace(/[^0-9\-]/g,"")}">📞 ${p.tel}</a>` : ""}
          ${p.homepage && p.homepage.startsWith("http") ? `<a class="action-btn btn-site" href="${p.homepage}" target="_blank">🌐 홈페이지</a>` : ""}
          ${p.homepage && !p.homepage.startsWith("http") && p.homepage.length > 5 ? `<a class="action-btn btn-site" href="https://${p.homepage}" target="_blank">🌐 홈페이지</a>` : ""}
        </div>
      </div>
    </div>`;
  }).join("");
}

/* ── 카드 선택 ── */
function selectCard(id) {
  selectedId = selectedId === id ? null : id;
  renderCards();
  if (selectedId === null && infoWindow) infoWindow.close();
  if (selectedId !== null) {
    setTimeout(() => {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }, 50);
  }
}

/* ── 지도 마커 ── */
function renderMarkers() {
  if (!map) return;
  markers.forEach(m => m.setMap(null));
  markers = [];
  markerMap = {};

  const filtered = getFiltered();

  filtered.forEach(p => {
    const searchAddr = p.fullAddr || (p.sido + " " + p.sigungu + " " + p.addr);
    if (!searchAddr.trim()) return;

    naver.maps.Service.geocode({ query: searchAddr }, (status, res) => {
      if (status !== naver.maps.Service.Status.OK) return;
      const item = res.v2?.addresses?.[0];
      if (!item) return;
      const lat = parseFloat(item.y), lng = parseFloat(item.x);

      const marker = new naver.maps.Marker({
        position: new naver.maps.LatLng(lat, lng),
        map,
        title: p.name,
        icon: {
          content: `<div style="background:${p.indoor==="실내"?"#1255CC":"#059669"};color:#fff;padding:4px 9px;border-radius:14px;font-size:11px;font-weight:700;font-family:Noto Sans KR,sans-serif;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.2)">${p.name}</div>`,
          anchor: new naver.maps.Point(0, 0),
        }
      });

      markerMap[p.id] = { marker, lat, lng };

      naver.maps.Event.addListener(marker, "click", () => {
        selectedId = p.id;
        renderCards();
        openInfoWindow(p, marker);
        const el = document.querySelector(`[data-id="${p.id}"]`);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });
      markers.push(marker);
    });
  });

  // 지도 중심 이동
  if (filtered.length > 0) {
    const first = filtered[0];
    const searchAddr = first.fullAddr || (first.sido + " " + first.sigungu);
    naver.maps.Service.geocode({ query: searchAddr }, (status, res) => {
      if (status !== naver.maps.Service.Status.OK) return;
      const item = res.v2?.addresses?.[0];
      if (!item) return;
      map.setCenter(new naver.maps.LatLng(parseFloat(item.y), parseFloat(item.x)));
      map.setZoom(12);
    });
  }
}

/* ── 지도 보기 버튼 ── */
function showOnMap(id) {
  if (!map) return;
  const p = POOLS.find(x => x.id === id);
  if (!p) return;

  const doShow = (lat, lng, marker) => {
    map.setCenter(new naver.maps.LatLng(lat, lng));
    map.setZoom(16);
    if (marker) openInfoWindow(p, marker);
  };

  // 이미 마커가 있으면 바로 이동
  if (markerMap[id]) {
    const { marker, lat, lng } = markerMap[id];
    doShow(lat, lng, marker);
    return;
  }

  // 없으면 지오코딩 후 이동
  const searchAddr = p.fullAddr || (p.sido + " " + p.sigungu + " " + p.addr);
  naver.maps.Service.geocode({ query: searchAddr }, (status, res) => {
    if (status !== naver.maps.Service.Status.OK) return;
    const item = res.v2?.addresses?.[0];
    if (!item) return;
    const lat = parseFloat(item.y), lng = parseFloat(item.x);
    doShow(lat, lng, null);
  });
}

function openInfoWindow(p, marker) {
  if (!infoWindow) return;
  const laneText = p.lanes && p.lanes !== "0" && p.lanes !== "-" ? p.lanes + "레인" : "";
  const sizeText = (p.length && p.width) ? p.length + "m × " + p.width + "m" : "";
  infoWindow.setContent(`
    <div style="padding:12px 14px;font-family:Noto Sans KR,sans-serif;min-width:180px;max-width:240px">
      <div style="font-weight:700;font-size:13px;margin-bottom:4px;line-height:1.3">${p.name}</div>
      <div style="font-size:11px;color:#6B7280;margin-bottom:6px">${p.sido} ${p.sigungu}${p.addr ? " · " + p.addr : ""}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:${p.indoor==="실내"?"#EDE9FE":"#E0F9FF"};color:${p.indoor==="실내"?"#6D28D9":"#0369A1"}">${p.indoor}</span>
        ${laneText ? `<span style="font-size:11px;padding:2px 7px;border-radius:4px;background:#F1F5F9;color:#475569">${laneText}</span>` : ""}
        ${sizeText ? `<span style="font-size:11px;padding:2px 7px;border-radius:4px;background:#FEF3C7;color:#92400E">${sizeText}</span>` : ""}
      </div>
    </div>
  `);
  infoWindow.open(map, marker);
}

/* ── 상태 표시 ── */
function showState(type) {
  document.getElementById("stateBox").style.display = "flex";
  document.getElementById("resultsInfo").style.display = "none";
  document.getElementById("cardList").innerHTML = "";
  if (type === "loading") {
    document.getElementById("stateBox").innerHTML = '<div class="spinner"></div><div class="state-title" style="margin-top:8px">검색 중...</div>';
  }
}

/* ── 이벤트 ── */
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch();
});

document.querySelectorAll(".chip").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".chip").forEach(b => b.classList.remove("on"));
    this.classList.add("on");
    activeFilter = this.dataset.f;
    renderCards();
    renderMarkers();
  });
});

/* ── 초기화 ── */
window.addEventListener("load", () => {
  if (USE_MAP) {
    const script = document.createElement("script");
    script.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=${NAVER_CLIENT_ID}&submodules=geocoder`;
    script.onload = initMap;
    document.head.appendChild(script);
  } else {
    initMap();
  }
});
</script>
</body>
</html>
