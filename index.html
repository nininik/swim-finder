<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>공영수영장 찾기 🏊</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- ① 인증 실패 핸들러: SDK 로드 전 반드시 정의 -->
<script>
window.navermap_authFailure = function() {
  var el = document.getElementById('map');
  if (el) el.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;'+
    'height:100%;gap:12px;font-family:sans-serif;color:#4B5775;text-align:center;padding:2rem">'+
    '<div style="font-size:36px">🔑</div>'+
    '<div style="font-size:13px;font-weight:500">API 인증 실패<br>Client ID 또는 허용 도메인을 확인하세요</div></div>';
};
</script>

<!-- ② SDK 동기 로드 (Hello World 예제 방식) -->
<script type="text/javascript"
  src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=tg6az681o1&submodules=geocoder">
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Noto Sans KR",sans-serif;background:#F5F7FA;color:#12192E}
:root{
  --blue:#1255CC;--navy:#0A2A6E;--green:#059669;
  --surface:#fff;--border:#DDE3EC;
  --text:#12192E;--sub:#4B5775;--muted:#8897B3;
}
/* 전체 레이아웃 */
.wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{flex:0 0 52px;background:var(--navy);color:#fff;
  padding:0 20px;display:flex;align-items:center;gap:8px;z-index:10}
header .logo{font-size:18px}
header h1{font-size:15px;font-weight:700}
header .cnt{font-size:11px;color:#93A8D0;margin-left:4px}
/* 진행 바 */
#gbar{flex:0 0 3px;background:#DDE3EC}
#gprog{height:3px;width:0;background:var(--blue);transition:width .2s}
/* 본문 */
.body{flex:1 1 0;min-height:0;display:grid;grid-template-columns:380px 1fr}
/* 사이드바 */
.sb{display:flex;flex-direction:column;border-right:1px solid var(--border);background:#fff;overflow:hidden}
.sa{flex:0 0 auto;padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.sr{display:flex;gap:7px;margin-bottom:8px}
.si{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.si:focus{border-color:var(--blue)}
.sbtn{padding:9px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.qr{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.qb{padding:3px 9px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:#fff;color:var(--sub);font-family:inherit}
.qb:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.fr{display:flex;gap:5px;flex-wrap:wrap}
.ch{padding:4px 11px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:var(--sub);font-family:inherit;font-weight:500}
.ch.on{background:var(--blue);color:#fff;border-color:var(--blue)}
/* 결과 목록 */
.res{flex:1 1 0;overflow-y:auto;padding:10px}
.ri{font-size:12px;color:var(--muted);margin-bottom:8px;padding:0 2px}
.ri strong{color:var(--blue)}
/* 카드 */
.card{background:#fff;border:1.5px solid var(--border);border-radius:10px;
  padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:#93A8D0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card.sel{border-color:var(--blue);box-shadow:0 2px 12px rgba(18,85,204,.12)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:3px}
.cn{font-size:13px;font-weight:700;line-height:1.3}
.crg{font-size:11px;color:var(--muted);white-space:nowrap}
.ca{font-size:11px;color:var(--muted);margin-top:3px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
.t-i{background:#EDE9FE;color:#6D28D9}
.t-o{background:#DCFCE7;color:#166534}
.t-l{background:#E0F2FE;color:#0369A1}
.t-s{background:#FEF3C7;color:#92400E}
.detail{display:none;margin-top:10px;padding-top:9px;border-top:1px solid var(--border)}
.detail.open{display:block}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.di{background:#F8FAFC;border-radius:7px;padding:6px 9px}
.dl{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:1px;text-transform:uppercase}
.dv{font-size:12px;font-weight:500}
.ar{display:flex;gap:6px;flex-wrap:wrap}
.abtn{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:6px;
  font-size:11px;font-weight:500;font-family:inherit;text-decoration:none;cursor:pointer;border:none}
.abtn:hover{opacity:.85}
.bm{background:var(--blue);color:#fff}
.bm.done{background:var(--green)}
.bt{background:var(--green);color:#fff}
.bw{background:#374151;color:#fff}
/* 지도: 공식 문서 - 명시적 크기 필수 */
#map{width:100%;height:100%}
/* 마커 핀 */
.pin{padding:5px 9px;border-radius:12px;font-size:11px;font-weight:700;
  font-family:"Noto Sans KR",sans-serif;white-space:nowrap;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.28)}
.pin-i{background:#1255CC;color:#fff}
.pin-o{background:#059669;color:#fff}
/* 빈 상태 */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 1rem;gap:9px;color:var(--muted);text-align:center}
.ei{font-size:38px;line-height:1}
.et{font-size:14px;font-weight:500;color:var(--sub)}
.es{font-size:12px;line-height:1.6}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .body{grid-template-columns:1fr;grid-template-rows:50vh 1fr}
  #map{height:100%}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="logo">🏊</span>
    <h1>공영수영장 찾기</h1>
    <span id="poolCnt" class="cnt">목록 불러오는 중…</span>
  </header>
  <div id="gbar"><div id="gprog"></div></div>
  <div class="body">
    <aside class="sb">
      <div class="sa">
        <div class="sr">
          <input id="si" class="si" type="text" placeholder="지역명 또는 시설명 (예: 강남구, 수원시)">
          <button class="sbtn" onclick="doSearch()">검색</button>
        </div>
        <div class="qr">
          <button class="qb" onclick="qs('서울')">서울</button>
          <button class="qb" onclick="qs('경기')">경기</button>
          <button class="qb" onclick="qs('부산')">부산</button>
          <button class="qb" onclick="qs('대구')">대구</button>
          <button class="qb" onclick="qs('인천')">인천</button>
          <button class="qb" onclick="qs('광주')">광주</button>
          <button class="qb" onclick="qs('대전')">대전</button>
          <button class="qb" onclick="qs('강원')">강원</button>
          <button class="qb" onclick="qs('제주')">제주</button>
        </div>
        <div class="fr">
          <button class="ch on" data-f="all">전체</button>
          <button class="ch" data-f="indoor">실내</button>
          <button class="ch" data-f="outdoor">야외</button>
          <button class="ch" data-f="lanes">레인 있음</button>
          <button class="ch" data-f="50m">50m 풀</button>
        </div>
      </div>
      <div class="res" id="res">
        <div class="empty" id="emptyBox">
          <div class="ei">🔍</div>
          <div class="et">지역 또는 시설명을 검색하세요</div>
          <div class="es">시도·구군·시설명 모두 검색 가능</div>
        </div>
        <div id="ri" class="ri" style="display:none"></div>
        <div id="cardList"></div>
      </div>
    </aside>

    <!-- ③ map div: 공식 문서 - width/height 명시 필수 -->
    <div id="map"></div>

  </div>
</div>

<script>
/* ================================================
   데이터
================================================ */
var POOLS_URL = 'https://nininik.github.io/test/data/data.json';
var POOLS = [];
var POOLS_READY = false;

function inferIndoorFromName(name) {
  if (!name) return '실내';
  if (name.indexOf('야외') !== -1 || name.indexOf('워터파크') !== -1) return '실외';
  return '실내';
}
function mapRemotePool(d, i) {
  var sido = (d.province || '').replace(/\s+/g, ' ').trim();
  var sg = (d.district || '').replace(/\s+/g, ' ').trim();
  var name = (d.name || '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
  var addr = (d.address || '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
  var note = d['비고'] != null ? String(d['비고']).trim() : '';
  return {
    id: i,
    name: name,
    sido: sido,
    sg: sg,
    addr: addr,
    indoor: inferIndoorFromName(name),
    lanes: '',
    length: '',
    width: '',
    tel: '',
    hp: '',
    year: '',
    note: note
  };
}
function applyRemotePools(data) {
  if (!Array.isArray(data)) return;
  POOLS = data.map(mapRemotePool).filter(function(p) { return p.name; });
  POOLS_READY = true;
  var cnt = document.getElementById('poolCnt');
  if (cnt) cnt.textContent = '전국 ' + POOLS.length + '개 시설';
  var eb = document.getElementById('emptyBox');
  if (eb && !matched.length) {
    eb.innerHTML = '<div class="ei">🔍</div>' +
      '<div class="et">지역 또는 시설명을 검색하세요</div>' +
      '<div class="es">시도·구군·시설명 모두 검색 가능</div>';
  }
}
fetch(POOLS_URL)
  .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(applyRemotePools)
  .catch(function() {
    POOLS_READY = false;
    var eb = document.getElementById('emptyBox');
    if (eb) {
      eb.style.display = 'flex';
      eb.innerHTML = '<div class="ei">⚠️</div>' +
        '<div class="et">시설 목록을 불러올 수 없습니다</div>' +
        '<div class="es">네트워크 또는 <a href="' + POOLS_URL + '" target="_blank" style="color:#1255CC">데이터 주소</a>를 확인해 주세요.</div>';
    }
    var cnt = document.getElementById('poolCnt');
    if (cnt) cnt.textContent = '데이터 오류';
  });



/* ================================================
   전역 상태
================================================ */
var map, iw;
var markers=[], mMap={};
var matched=[], fil='all', selId=null;

/* ================================================
   localStorage 좌표 캐시
================================================ */
var NS='npool2_';
function ck(p){return NS+p.sido+'_'+p.sg+'_'+p.name;}
function getC(p){try{var v=localStorage.getItem(ck(p));return v?JSON.parse(v):null;}catch(e){return null;}}
function setC(p,lat,lng){try{localStorage.setItem(ck(p),JSON.stringify({lat:lat,lng:lng}));}catch(e){}}

/* ================================================
   geocode 쿼리
   - 주소 있으면: "시도 시군구 주소" (가장 정확)
   - 주소 없으면: "시설명 시도 시군구" (이름 검색)
================================================ */
function mkQ(p){
  if(p.addr && p.addr.trim().length > 2){
    return p.sido + ' ' + p.sg + ' ' + p.addr.trim();
  }
  var c=p.name;
  c=c.replace(/\([^)]*수영장[^)]*\)/g,'');
  c=c.replace(/수영장/g,'');
  c=c.replace(/\([^)]*\)/g,'');
  c=c.replace(/[/\\]/g,' ');
  c=c.replace(/\s+/g,' ').trim();
  return c+' '+p.sido+' '+p.sg;
}
/* fallback용: 이름만으로 검색 */
function mkQname(p){
  var c=p.name.replace(/수영장/g,'').replace(/\([^)]*\)/g,'').replace(/\s+/g,' ').trim();
  return c+' '+p.sido+' '+p.sg;
}

/* ================================================
   순차 geocode 큐
================================================ */
var Q=[], gTimer=null, gDone=0, gTotal=0;
function startQ(pools){
  clearQ();
  Q=pools.slice(); gTotal=pools.length; gDone=0;
  showBar(0,gTotal); nextQ();
}
function clearQ(){
  if(gTimer){clearTimeout(gTimer);gTimer=null;}
  Q=[]; gTotal=0; gDone=0; hideBar();
}
function nextQ(){
  if(!Q.length){hideBar();return;}
  if(!map){gTimer=setTimeout(nextQ,200);return;}
  var p=Q.shift();
  var c=getC(p);
  if(c){
    mkMark(p,c.lat,c.lng); gDone++;
    updateBar(gDone,gTotal); updBtn(p.id,true);
    gTimer=setTimeout(nextQ,0); return;
  }
  naver.maps.Service.geocode({query:mkQ(p)},function(st,res){
    gDone++; updateBar(gDone,gTotal);
    if(st===naver.maps.Service.Status.OK && res.v2 && res.v2.addresses && res.v2.addresses.length){
      var a=res.v2.addresses[0];
      var lat=parseFloat(a.y), lng=parseFloat(a.x);
      setC(p,lat,lng); mkMark(p,lat,lng); updBtn(p.id,true);
    } else {
      // fallback: 이름으로 재시도
      naver.maps.Service.geocode({query:mkQname(p)},function(s2,r2){
        if(s2===naver.maps.Service.Status.OK && r2.v2 && r2.v2.addresses && r2.v2.addresses.length){
          var a2=r2.v2.addresses[0];
          setC(p,parseFloat(a2.y),parseFloat(a2.x));
          mkMark(p,parseFloat(a2.y),parseFloat(a2.x)); updBtn(p.id,true);
        }
      });
    }
    gTimer=setTimeout(nextQ,220);
  });
}

/* ================================================
   마커 생성 (공식 문서: new naver.maps.Marker)
================================================ */
function mkMark(p,lat,lng){
  if(!map||mMap[p.id]) return;
  var pos=new naver.maps.LatLng(lat,lng);
  var isI=(p.indoor==='실내'||p.indoor==='실내외');
  var marker=new naver.maps.Marker({
    position:pos, map:map, title:p.name,
    icon:{
      content:'<div class="pin '+(isI?'pin-i':'pin-o')+'">'+p.name+'</div>',
      anchor:new naver.maps.Point(0,0)
    }
  });
  mMap[p.id]={marker:marker,lat:lat,lng:lng};
  markers.push(marker);
  /* 공식 문서: naver.maps.Event.addListener */
  naver.maps.Event.addListener(marker,'click',function(){
    selId=p.id; renderCards(); openIW(p,marker);
    var el=document.querySelector('[data-id="'+p.id+'"]');
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}

/* ================================================
   검색
================================================ */
function qs(q){document.getElementById('si').value=q;doSearch();}
function doSearch(){
  if(!POOLS_READY){
    alert('시설 목록을 불러오는 중입니다. 잠시 후 다시 시도해 주세요.');
    return;
  }
  var q=document.getElementById('si').value.trim();
  if(!q)return;
  showLoad(); clearQ(); clearMarkers(); selId=null;
  setTimeout(function(){
    matched=POOLS.filter(function(p){
      return p.name.includes(q)||p.sido.includes(q)||p.sg.includes(q)||p.addr.includes(q);
    });
    renderCards();
    if(!matched.length)return;
    var fl=getFiltered();
    startQ(fl);
    // 첫 시설로 지도 이동
    var f=fl[0]; if(!f)return;
    var c=getC(f);
    if(c){map.setCenter(new naver.maps.LatLng(c.lat,c.lng));map.setZoom(12);}
    else{
      naver.maps.Service.geocode({query:mkQ(f)},function(s,r){
        if(s===naver.maps.Service.Status.OK&&r.v2&&r.v2.addresses&&r.v2.addresses.length){
          var a=r.v2.addresses[0];
          map.setCenter(new naver.maps.LatLng(parseFloat(a.y),parseFloat(a.x)));
          map.setZoom(12);
        }
      });
    }
  },100);
}

/* ================================================
   필터
================================================ */
function getFiltered(){
  return matched.filter(function(p){
    if(fil==='indoor') return p.indoor==='실내';
    if(fil==='outdoor') return p.indoor!=='실내';
    if(fil==='lanes') return p.lanes&&p.lanes!==''&&p.lanes!=='-'&&p.lanes!=='0';
    if(fil==='50m') return p.length==='50';
    return true;
  });
}
function clearMarkers(){markers.forEach(function(m){m.setMap(null);});markers=[];mMap={};}

/* ================================================
   카드 렌더링
================================================ */
function renderCards(){
  var fl=getFiltered();
  var riEl=document.getElementById('ri');
  var list=document.getElementById('cardList');
  var eb=document.getElementById('emptyBox');
  if(!matched.length){
    list.innerHTML='';riEl.style.display='none';
    eb.innerHTML='<div class="ei">😔</div><div class="et">검색 결과 없음</div>';
    eb.style.display='flex';return;
  }
  eb.style.display='none';
  riEl.style.display='block';
  riEl.innerHTML='총 <strong>'+fl.length+'개</strong> 시설';
  list.innerHTML=fl.map(function(p){
    var reg=p.sido+(p.sg?' '+p.sg:'');
    var lane=(p.lanes&&p.lanes!=='0'&&p.lanes!=='-')?p.lanes+'레인':'';
    var size=(p.length&&p.width)?p.length+'m × '+p.width+'m':'';
    var sel=selId===p.id?' sel':'';
    var det=selId===p.id?' open':'';
    var hasMark=!!mMap[p.id];
    return '<div class="card'+sel+'" data-id="'+p.id+'" onclick="selCard('+p.id+')">'+
      '<div class="ct"><div class="cn">'+p.name+'</div><div class="crg">'+reg+'</div></div>'+
      (p.addr?'<div class="ca">'+p.addr+'</div>':'')+
      '<div class="tags">'+
        '<span class="tag '+(p.indoor==='실내'?'t-i':'t-o')+'">'+p.indoor+'</span>'+
        (lane?'<span class="tag t-l">'+lane+'</span>':'')+
        (size?'<span class="tag t-s">'+size+(p.length==='50'?' ⭐':'')+'</span>':'')+
      '</div>'+
      '<div class="detail'+det+'">'+
        '<div class="dg">'+
          '<div class="di"><div class="dl">레인</div><div class="dv">'+(lane||'정보없음')+'</div></div>'+
          '<div class="di"><div class="dl">규모</div><div class="dv">'+(size||'정보없음')+'</div></div>'+
          '<div class="di"><div class="dl">준공연도</div><div class="dv">'+(p.year||'정보없음')+'</div></div>'+
          '<div class="di"><div class="dl">실내외</div><div class="dv">'+p.indoor+'</div></div>'+
        '</div>'+
        '<div class="ar">'+
          '<button class="abtn bm'+(hasMark?' done':'')+'" data-mb="'+p.id+'" '+
            'onclick="event.stopPropagation();showOnMap('+p.id+')">'+(hasMark?'📍 위치 보기':'🗺️ 지도 보기')+'</button>'+
          (p.tel?'<a class="abtn bt" href="tel:'+p.tel.replace(/[^0-9\-]/g,'')+'">📞 전화</a>':'')+
          (p.hp&&p.hp.length>4?'<a class="abtn bw" href="'+(p.hp.startsWith('http')?p.hp:'https://'+p.hp)+'" target="_blank">🌐 홈페이지</a>':'')+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function selCard(id){
  selId=selId===id?null:id;
  renderCards();
  if(selId===null&&iw)iw.close();
  else setTimeout(function(){
    var el=document.querySelector('[data-id="'+id+'"]');
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}

/* ================================================
   지도 보기 버튼
   공식 문서: geocode → setCenter + setZoom + infoWindow
================================================ */
function showOnMap(id){
  if(!map){alert('지도가 준비 중입니다. 잠시 후 다시 눌러주세요.');return;}
  var p=null;
  for(var i=0;i<POOLS.length;i++){if(POOLS[i].id===id){p=POOLS[i];break;}}
  if(!p)return;

  /* ① 마커 이미 있음 → 즉시 이동 */
  if(mMap[id]){
    gotoMap(p,mMap[id].lat,mMap[id].lng,mMap[id].marker);
    return;
  }

  /* ② 캐시 좌표 있음 */
  var cached=getC(p);
  if(cached){
    mkMark(p,cached.lat,cached.lng);
    gotoMap(p,cached.lat,cached.lng,mMap[id].marker);
    updBtn(id,true);
    return;
  }

  /* ③ geocode API 호출 (주소 or 시설명 + 지역) */
  setBtn(id,'⌛ 검색 중...');
  geocodePool(p,mkQ(p),function(ok){
    if(!ok){
      /* fallback: 이름으로 재시도 */
      geocodePool(p,mkQname(p),function(ok2){
        if(!ok2)setBtn(id,'❌ 위치 없음');
      });
    }
  });
}

/* geocode 공통 함수 (공식 문서 패턴) */
function geocodePool(p,query,cb){
  naver.maps.Service.geocode({query:query},function(status,response){
    /* 공식 문서: status === naver.maps.Service.Status.OK */
    if(status!==naver.maps.Service.Status.OK){cb(false);return;}
    var addrs=response.v2&&response.v2.addresses;
    if(!addrs||!addrs.length){cb(false);return;}
    /* 공식 문서: addresses[0].x = 경도, .y = 위도 */
    var lat=parseFloat(addrs[0].y), lng=parseFloat(addrs[0].x);
    setC(p,lat,lng);
    mkMark(p,lat,lng);
    updBtn(p.id,true);
    gotoMap(p,lat,lng,mMap[p.id]?mMap[p.id].marker:null);
    cb(true);
  });
}

/* 지도 이동 + 정보창 */
function gotoMap(p,lat,lng,marker){
  /* 공식 문서: map.setCenter + map.setZoom */
  map.setCenter(new naver.maps.LatLng(lat,lng));
  map.setZoom(16);
  if(marker)openIW(p,marker);
}

/* ================================================
   정보창 (공식 문서: setContent + open)
================================================ */
function openIW(p,marker){
  if(!iw||!map)return;
  var lane=(p.lanes&&p.lanes!=='0'&&p.lanes!=='-')?p.lanes+'레인':'';
  var size=(p.length&&p.width)?p.length+'m × '+p.width+'m':'';
  var ic=p.indoor==='실내'?'#6D28D9':'#0369A1';
  var ibg=p.indoor==='실내'?'#EDE9FE':'#E0F9FF';
  /* 공식 문서: setContent */
  iw.setContent(
    '<div style="padding:11px 14px;font-family:Noto Sans KR,sans-serif;min-width:170px;max-width:230px;line-height:1.4">'+
    '<div style="font-weight:700;font-size:13px;margin-bottom:3px">'+p.name+'</div>'+
    '<div style="font-size:11px;color:#6B7280;margin-bottom:7px">'+p.sido+' '+p.sg+(p.addr?' · '+p.addr:'')+'</div>'+
    '<div style="display:flex;gap:4px;flex-wrap:wrap">'+
      '<span style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:'+ibg+';color:'+ic+'">'+p.indoor+'</span>'+
      (lane?'<span style="font-size:11px;padding:2px 7px;border-radius:4px;background:#F1F5F9;color:#475569">'+lane+'</span>':'')+
      (size?'<span style="font-size:11px;padding:2px 7px;border-radius:4px;background:#FEF3C7;color:#92400E">'+size+'</span>':'')+
    '</div>'+
    '</div>'
  );
  /* 공식 문서: open(map, marker) */
  iw.open(map,marker);
}

/* ================================================
   헬퍼
================================================ */
function updBtn(id,done){
  var b=document.querySelector('[data-mb="'+id+'"]');
  if(!b)return;
  if(done){b.classList.add('done');b.textContent='📍 위치 보기';}
}
function setBtn(id,txt){
  var b=document.querySelector('[data-mb="'+id+'"]');
  if(b)b.textContent=txt;
}
function showLoad(){
  document.getElementById('emptyBox').style.display='flex';
  document.getElementById('emptyBox').innerHTML='<div class="spin"></div><div class="et" style="margin-top:7px">검색 중...</div>';
  document.getElementById('ri').style.display='none';
  document.getElementById('cardList').innerHTML='';
}
function showBar(d,t){document.getElementById('gbar').style.opacity='1';updateBar(d,t);}
function updateBar(d,t){if(!t)return;document.getElementById('gprog').style.width=Math.round(d/t*100)+'%';}
function hideBar(){document.getElementById('gbar').style.opacity='0';}

document.getElementById('si').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
document.querySelectorAll('.ch').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.ch').forEach(function(x){x.classList.remove('on');});
    this.classList.add('on'); fil=this.dataset.f;
    clearMarkers(); renderCards();
    if(matched.length)startQ(getFiltered());
  });
});

/* ================================================
   ④ 앱 시작 (공식 문서: SDK 로드 후 직접 초기화)
   - SDK는 위 <head>에서 동기 로드됐으므로
     naver 객체가 이미 사용 가능
================================================ */
map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(36.5, 127.5),
  zoom: 7
});
iw = new naver.maps.InfoWindow({ anchorSkew: true });
